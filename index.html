<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>简易测试APP</title>
<style>
body{background:#3498db;color:#fff;text-align:center;padding-top:80px;margin:0;}
.btn{
  width:200px;
  height:55px;
  margin:25px auto;
  font-size:17px;
  border:none;
  border-radius:10px;
  display:block;
}
</style>
</head>
<body>

<h1>我的第一个安卓APP</h1>
<p>按钮可以点击测试</p>

<button class="btn" onclick="alert('按钮正常能用！测试成功')">点击弹窗</button>
<button class="btn" onclick="document.body.style.background='#27ae60'">更换背景颜色</button>

</body>
</html>
